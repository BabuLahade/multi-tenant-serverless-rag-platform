name: Build Lambda Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::882083662991:role/nova-github-actions-role
          aws-region: ap-south-1

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Create package directory
        run: |
          mkdir -p lambda/packages

      - name: Build Chat Package
        run: |
          mkdir -p build/chat

          cp -r lambda/nova_chat/* build/chat/
          cp -r lambda/shared build/chat/

          pip install -r lambda/nova_chat/requirements.txt -t build/chat

          cd build
          zip -r ../lambda/packages/nova-chat.zip chat

      - name: Verify Packages
        run: |
          echo "Repository root:"
          pwd

          echo "Lambda packages:"
          ls -R lambda/packages

      - name: Build Ingest Package
        run: |
          mkdir -p build/ingest

          cp -r lambda/nova_ingest/* build/ingest/
          cp -r lambda/shared build/ingest/

          pip install -r lambda/nova_ingest/requirements.txt -t build/ingest

          cd build
          zip -r ../lambda/packages/nova-ingest.zip ingest

      - name: Build Crawl Package
        run: |
          mkdir -p build/crawl

          cp -r lambda/nova_crawl/* build/crawl/
          cp -r lambda/shared build/crawl/

          pip install -r lambda/nova_crawl/requirements.txt -t build/crawl

          cd build
          zip -r ../lambda/packages/nova-crawl.zip crawl
      - name: Show package sizes
        run: |
          du -sh lambda/packages/*
      - name: Upload Lambda Packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: lambda/packages/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_gemini_api_key }}
        run: |
          terraform plan \
            -var="aws_region=ap-south-1" \
            -var="project_name=nova-rag" \
            -var="environment=dev"

      # - name: Terraform Apply
      #   if: github.ref == 'refs/heads/main'
      #   working-directory: terraform
      #   env:
      #     TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_gemini_api_key }}
      #   run: |
      #     terraform apply \
      #       -auto-approve \
      #       -var="aws_region=ap-south-1" \
      #       -var="project_name=nova-rag" \
      #       -var="environment=dev"

  deploy:
    name: Deploy Infrastructure

    needs: build

    runs-on: ubuntu-latest

    environment:
      name: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::882083662991:role/nova-github-actions-role
          aws-region: ap-south-1

      - name: Download Lambda Packages
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: lambda/packages

      - name: Verify Packages
        run: |
          ls -R lambda/packages

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_gemini_api_key }}
        run: |
          terraform apply \
            -auto-approve \
            -var="aws_region=ap-south-1" \
            -var="project_name=nova-rag" \
            -var="environment=dev"