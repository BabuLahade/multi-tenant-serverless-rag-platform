name: Build Lambda Packages

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Create package directory
        run: |
          mkdir -p lambda/packages

      - name: Build Chat Package
        run: |
          mkdir -p build/chat

          cp -r lambda/nova_chat/* build/chat/
          cp -r lambda/shared build/chat/

          pip install -r lambda/nova_chat/requirements.txt -t build/chat

          cd build
          zip -r ../lambda/packages/nova-chat.zip chat

      - name: Build Ingest Package
        run: |
          mkdir -p build/ingest

          cp -r lambda/nova_ingest/* build/ingest/
          cp -r lambda/shared build/ingest/

          pip install -r lambda/nova_ingest/requirements.txt -t build/ingest

          cd build
          zip -r ../lambda/packages/nova-ingest.zip ingest

      - name: Build Crawl Package
        run: |
          mkdir -p build/crawl

          cp -r lambda/nova_crawl/* build/crawl/
          cp -r lambda/shared build/crawl/

          pip install -r lambda/nova_crawl/requirements.txt -t build/crawl

          cd build
          zip -r ../lambda/packages/nova-crawl.zip crawl

      - name: Upload Lambda Packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: lambda/packages/